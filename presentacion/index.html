<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OTC — Demo (capturas reales)</title>
<style>
  :root{
    --violet:#7c3aed; --violet-dark:#6d28d9; --coral:#fb6f92;
    --ink:#1f2433; --muted:#6b7280; --line:#e9e3f3;
    --bg1:#f8f5fc; --bg2:#eee7f7; --glass:rgba(255,255,255,.62);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 500px at 8% -10%, rgba(139,92,246,.18), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(251,111,146,.16), transparent 55%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
    overflow:hidden;
  }
  .aurora{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.45}
  .b1{width:32rem;height:32rem;left:-10rem;top:-10rem;background:rgba(167,139,250,.5);animation:float 16s ease-in-out infinite}
  .b2{width:28rem;height:28rem;right:-8rem;bottom:-8rem;background:rgba(251,111,146,.4);animation:float 20s ease-in-out infinite reverse}
  @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}

  .progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--violet),var(--coral));z-index:5;transition:width .3s}
  .brand{position:fixed;top:18px;left:22px;z-index:4;display:flex;align-items:center;gap:9px}
  .brand b{font-size:17px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(90deg,var(--violet-dark),var(--violet),var(--coral));-webkit-background-clip:text;background-clip:text;color:transparent}

  .stage{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:54px 28px 96px}
  .frame{
    position:relative;max-width:1040px;width:100%;border-radius:16px;overflow:hidden;
    box-shadow:0 40px 90px -34px rgba(80,40,120,.55);border:1px solid rgba(255,255,255,.7);
    background:#fff;
  }
  .barfake{display:flex;align-items:center;gap:7px;padding:9px 13px;background:#ece7f3;border-bottom:1px solid rgba(0,0,0,.05)}
  .barfake i{width:11px;height:11px;border-radius:50%}
  .url{margin-left:8px;font-size:12px;color:#7a6c88;background:#f6f3fb;border-radius:999px;padding:3px 14px}
  .shot{display:block;width:100%;max-height:64vh;object-fit:contain;background:#faf8fe}
  .missing{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:340px;padding:40px;text-align:center;color:var(--muted)}
  .missing .big{font-size:40px}
  .missing code{background:#f1ecf7;color:var(--violet-dark);padding:2px 8px;border-radius:6px;font-size:14px}

  .caption{max-width:1040px;width:100%;display:flex;align-items:center;gap:14px;background:var(--glass);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:14px 18px}
  .caption .step{flex:0 0 auto;width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--violet),var(--coral));color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center}
  .caption h2{font-size:18px;margin:0}
  .caption p{font-size:14px;color:var(--muted);margin:2px 0 0}

  .controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:4;display:flex;align-items:center;gap:14px;background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.7);border-radius:999px;padding:8px 12px;box-shadow:0 14px 30px -16px rgba(80,40,120,.5)}
  .nav{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:20px;background:linear-gradient(135deg,var(--violet),var(--violet-dark));color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .nav:hover{transform:scale(1.08)} .nav:disabled{opacity:.35;cursor:default;transform:none}
  .dots{display:flex;gap:7px}
  .dt{width:9px;height:9px;border-radius:50%;background:#cbb9ec;border:none;cursor:pointer;padding:0;transition:transform .15s}
  .dt.on{background:var(--violet);transform:scale(1.3)}
  .count{font-size:13px;font-weight:700;color:var(--violet-dark);min-width:46px;text-align:center}
  .hint{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);z-index:4;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="progress" id="progress"></div>
<div class="brand">
  <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#7c3aed"/><stop offset=".55" stop-color="#a855f7"/><stop offset="1" stop-color="#fb6f92"/></linearGradient></defs><rect width="40" height="40" rx="12" fill="url(#bg)"/><rect width="40" height="20" rx="12" fill="#fff" opacity=".12"/><path d="M20 9.5a7.2 7.2 0 0 0-7.2 7.2c0 5.3 7.2 13.8 7.2 13.8s7.2-8.5 7.2-13.8A7.2 7.2 0 0 0 20 9.5z" fill="#fff"/><circle cx="20" cy="16.4" r="3" fill="url(#bg)"/></svg>
  <b>OTC</b>
</div>

<div class="stage">
  <div class="frame">
    <div class="barfake"><i style="background:#fb7185"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i><span class="url" id="url">otc.app</span></div>
    <img class="shot" id="shot" alt="" />
    <div class="missing" id="missing" style="display:none">
      <div class="big">📸</div>
      <p>Falta esta captura: <code id="missName">capturas/01.png</code></p>
      <p id="missTip" style="max-width:48ch"></p>
    </div>
  </div>
  <div class="caption">
    <span class="step" id="capStep">1</span>
    <div><h2 id="capTitle">—</h2><p id="capDesc">—</p></div>
  </div>
</div>

<div class="hint" id="hint">Usá ← → (o la barra espaciadora) para pasar las pantallas</div>
<div class="controls">
  <button class="nav" id="prev" aria-label="Anterior">‹</button>
  <div class="dots" id="dots"></div>
  <span class="count" id="count">1 / 1</span>
  <button class="nav" id="next" aria-label="Siguiente">›</button>
</div>

<script>
  /* ===========================================================
     Editá esta lista: poné tus capturas en la carpeta capturas/
     con estos nombres (o cambiá los nombres acá). file = archivo,
     url = lo que se ve en la "barra del navegador", title/desc =
     el cartelito de abajo (lo que contás en la demo).
     =========================================================== */
  const SLIDES = [
    { file:"capturas/01-inicio.png",   url:"otc.app",                 title:"Página de inicio",        desc:"La propuesta: reservá turismo sin intermediarios. Comisiones justas, pagos al instante." },
    { file:"capturas/02-login.png",    url:"otc.app/login",           title:"Login híbrido (RF-A01)",  desc:"Entrás con email/contraseña y conectás la wallet para firmar. Hay cuentas de demo de un click." },
    { file:"capturas/03-catalogo.png", url:"otc.app/catalogo",        title:"Catálogo on-chain (RF-B02)", desc:"16 paquetes leídos de la blockchain, incluidas actividades gratis. Cada uno es un NFT." },
    { file:"capturas/04-reservar.png", url:"otc.app/catalogo",        title:"Reservar (RF-C01)",       desc:"Reservás en 2 pasos (approve + purchase). El pago queda en escrow, no va al hotel todavía." },
    { file:"capturas/05-reservas.png", url:"otc.app/reservas",        title:"Mis reservas",            desc:"Tus reservas viven on-chain, atadas a tu wallet. Estado, fechas y monto." },
    { file:"capturas/06-proveedor.png",url:"otc.app/proveedor",       title:"Confirmar servicio ⭐",    desc:"El proveedor confirma y, en una sola tx, el dinero se reparte 85/12/3 automáticamente." },
    { file:"capturas/07-agente.png",   url:"otc.app/agente",          title:"El agente cobró (RF-D02)",desc:"Dashboard de comisiones + generador de link de afiliado. Su 12% ya está cobrado." },
    { file:"capturas/08-mercado.png",  url:"otc.app/mercado",         title:"Mercado secundario (RF-C02)", desc:"Si no podés viajar, revendés tu reserva. Royalty 5% al proveedor + fee 2% plataforma." },
    { file:"capturas/09-tarjeta.png",  url:"otc.app/catalogo",        title:"Pagar con tarjeta (AA)",  desc:"Un usuario sin cripto reserva con tarjeta: cuenta inteligente + gas patrocinado." },
  ];

  const shot = document.getElementById('shot');
  const missing = document.getElementById('missing');
  const missName = document.getElementById('missName');
  const missTip = document.getElementById('missTip');
  const url = document.getElementById('url');
  const capStep = document.getElementById('capStep');
  const capTitle = document.getElementById('capTitle');
  const capDesc = document.getElementById('capDesc');
  const dotsBox = document.getElementById('dots');
  const prev = document.getElementById('prev'), next = document.getElementById('next');
  const count = document.getElementById('count'), progress = document.getElementById('progress');
  const hint = document.getElementById('hint');
  let i = 0;

  SLIDES.forEach((_, k) => {
    const d = document.createElement('button');
    d.className = 'dt' + (k === 0 ? ' on' : '');
    d.onclick = () => go(k);
    dotsBox.appendChild(d);
  });
  const dots = [...dotsBox.children];

  function go(n){
    i = Math.max(0, Math.min(SLIDES.length - 1, n));
    const s = SLIDES[i];
    url.textContent = s.url;
    capStep.textContent = i + 1;
    capTitle.textContent = s.title;
    capDesc.textContent = s.desc;
    // imagen o placeholder
    missing.style.display = 'none';
    shot.style.display = 'block';
    shot.src = s.file;
    shot.onerror = () => {
      shot.style.display = 'none';
      missing.style.display = 'flex';
      missName.textContent = s.file;
      missTip.textContent = s.title + " — " + s.desc;
    };
    dots.forEach((d, k) => d.classList.toggle('on', k === i));
    count.textContent = (i + 1) + ' / ' + SLIDES.length;
    progress.style.width = ((i + 1) / SLIDES.length * 100) + '%';
    prev.disabled = i === 0; next.disabled = i === SLIDES.length - 1;
    if (i > 0 && hint) hint.style.display = 'none';
  }
  prev.onclick = () => go(i - 1);
  next.onclick = () => go(i + 1);
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown'){ e.preventDefault(); go(i + 1); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); go(i - 1); }
    if (e.key === 'Home') go(0); if (e.key === 'End') go(SLIDES.length - 1);
  });
  go(0);
</script>
</body>
</html>
